<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Course Organizer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Courses Organizer</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="mycourses.html">My Courses</a>
        <a href="addCourses.html">Add Courses</a>
        <a href="contact.html">Contact Us</a>
      </nav>
    </header>
    <main>
      <section>
        <h2>For Helping Only</h2>
        <p>
          If you face any issues organizing your courses, make a message that we
          can from it help you.
        </p>
        <br />
        <form action="index.html" method="get">
          <div class="form-group">
            <label for="userName">Your Name:</label>
            <input
              type="text"
              id="userName"
              name="userName"
              required
              placeholder="e.g. pope"
            />
          </div>

          <div class="form-group">
            <label for="userEmail">Email Address:</label>
            <input
              type="email"
              id="userEmail"
              name="userEmail"
              required
              placeholder="e.g. dev123@gmail.com"
            />
          </div>

          <div class="form-group">
            <label for="message">Message:</label>
            <textarea
              id="message"
              name="message"
              rows="5"
              required
              placeholder="How can we help you?"
            ></textarea>
          </div>
          <a href="index.html"><button type="submit">Send Message</button></a>
        </form>
      </section>
    </main>
    <footer>
      <h4>&copy;All rights reserved</h4>
    </footer>
  </body>
</html>
