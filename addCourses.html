<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Course Organizer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Courses Organizer</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="mycourses.html">My Courses</a>
        <a href="addCourses.html">Add Courses</a>
        <a href="contact.html">Contact Us</a>
      </nav>
    </header>
    <main>
      <section>
        <h2>Add A New Course</h2>
        <form action="index.html" method="get">
          <div class="form-group">
            <label for="courseName">Course Name:</label>
            <input
              type="text"
              id="courseName"
              name="courseName"
              required
              placeholder="e.g., Programming Language 1"
            />
          </div>

          <div class="form-group">
            <label for="instructor">Instructor:</label>
            <input
              type="text"
              id="instructor"
              name="instructor"
              required
              placeholder="Instructor's Name"
            />
          </div>

          <div class="form-group">
            <label for="creditHours">Credit Hours:</label>
            <input
              type="number"
              id="creditHours"
              name="creditHours"
              min="1"
              max="6"
              required
              placeholder="e.g., 3"
            />
          </div>

          <div class="form-group">
            <label for="notes">Notes:</label>
            <textarea
              id="notes"
              name="notes"
              rows="4"
              placeholder="Any special notes or requirements..."
            ></textarea>
          </div>
          <a href="index.html"><button type="submit">Save Course</button></a>
        </form>
      </section>
    </main>
    <footer>
      <h4>&copy;All rights reserved</h4>
    </footer>
  </body>
</html>
